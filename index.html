<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somalia World V15.1 - Fix Login</title>
    <style>
        :root { --p-color: #a200ff; --gold: #ffd700; --bg-dark: rgba(0, 0, 0, 0.95); }
        body { background: #0b001a; color: #e0b0ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; background-image: url('https://w0.peakpx.com/wallpaper/439/613/HD-wallpaper-purple-asteroid-purple-aesthetic-galaxy.jpg'); background-size: cover; background-attachment: fixed; }
        .container { background: var(--bg-dark); border: 2px solid var(--p-color); border-radius: 15px; padding: 15px; max-width: 480px; margin: auto; box-shadow: 0 0 25px var(--p-color); }
        .screen { display: none; } .active { display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; text-align: left; font-size: 13px; color: var(--gold); border-bottom: 1px dashed var(--p-color); padding-bottom: 5px; }
        .hp-bar { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #fff; position: relative; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #ff9494); transition: 0.3s; width: 100%; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 11px; line-height: 20px; color: white; text-shadow: 1px 1px black; }
        button { background: #4b0082; color: white; border: 1px solid var(--p-color); padding: 10px; margin: 4px; cursor: pointer; width: 94%; border-radius: 8px; font-weight: bold; }
        .item-card { border: 1px solid #444; padding: 10px; margin: 5px; background: rgba(255,255,255,0.05); border-radius: 5px; text-align: left; font-size: 12px; }
        .shop-tab { display: flex; justify-content: space-around; margin-bottom: 10px; gap: 5px; }
        .shop-tab span { cursor: pointer; padding: 8px 5px; border: 1px solid var(--p-color); border-radius: 5px; font-size: 11px; flex: 1; background: #1a1a1a; color: white; }
        .active-tab { background: var(--p-color) !important; font-weight: bold; }
        .log { font-size: 12px; height: 120px; overflow-y: auto; color: #ccc; background: rgba(0,0,0,0.8); padding: 8px; margin-top: 10px; text-align: left; border: 1px solid #444; }
        input { padding: 12px; width: 85%; margin-bottom: 10px; border-radius: 5px; border: 1px solid var(--p-color); background: #1a1a1a; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="screen active">
        <h1>SOMALIA WORLD V15.1</h1>
        <input type="text" id="user" placeholder="Tên nhân vật"><br>
        <input type="password" id="pass" placeholder="Mật khẩu"><br>
        <button onclick="auth('login')">ĐĂNG NHẬP</button>
        <button onclick="auth('reg')" style="background:none; border:none; color:#888; font-size:12px;">Chưa có nick? Đăng ký tại đây</button>
    </div>

    <div id="job-screen" class="screen">
        <h2>CHỌN NGHỀ NGHIỆP</h2>
        <button onclick="setJob('Chiến Binh')">⚔️ CHIẾN BINH</button>
        <button onclick="setJob('Pháp Sư')">🔮 PHÁP SƯ</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-grid">
            <div>💰 Vàng: <span id="gold">0</span></div>
            <div>🛡️ Nghề: <span id="job-display">-</span></div>
            <div>⚔️ Dame: <span id="dmg-display">0</span></div>
            <div>⭐ Cấp: <span id="lvl">1</span></div>
        </div>
        <div class="hp-bar"><div id="hp-fill"></div><div class="hp-text" id="hp-display">100/100</div></div>
        
        <select id="mob-select" onchange="changeMob()" style="padding: 10px; width: 95%; background: #1a1a1a; color: gold; border: 1px solid var(--p-color); border-radius: 8px;"></select>
        <h3 id="mob-name" style="margin:10px 0 5px 0; color: #ff4d4d;">-</h3>
        <div style="font-size:13px; margin-bottom: 10px;">HP Quái: <span id="mob-hp">0</span></div>

        <button onclick="attack()" style="background:#800000; height:55px;">⚔️ TẤN CÔNG</button>
        <button onclick="showScreen('shop-screen')">🛒 CỬA HÀNG</button>
        <div style="display:flex; justify-content: space-between;">
            <button onclick="useHeal()" style="background:#28a745; width:48%;">🧪 BÌNH MÁU (<span id="pot-count">0</span>)</button>
            <button onclick="showScreen('bag-screen')" style="width:48%;">🎒 TÚI ĐỒ</button>
        </div>
        <div id="game-log" class="log"></div>
    </div>

    <div id="shop-screen" class="screen">
        <h2>CỬA HÀNG</h2>
        <div class="shop-tab">
            <span id="tab-War" onclick="renderShop('War')">CHIẾN BINH</span>
            <span id="tab-Mag" onclick="renderShop('Mag')">PHÁP SƯ</span>
            <span id="tab-Acc" onclick="renderShop('Acc')">PHỤ KIỆN</span>
        </div>
        <div id="shop-list" style="max-height: 350px; overflow-y: auto;"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>

    <div id="bag-screen" class="screen">
        <h2>TÚI ĐỒ</h2>
        <div id="inventory-list"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SOMALIA_V14_DATA_';
    
    const MOBS_DATA = [
        { name: "Slime Xanh", hp: 100, gold: 60, phan: 0.1 },
        { name: "Vua Slime", hp: 2500, gold: 650, phan: 0.1 },
        { name: "Lính Xương", hp: 8000, gold: 2000, phan: 0.1 },
        { name: "Vua Xương Cổ Đại", hp: 45000, gold: 30000, phan: 0.2 },
        { name: "Thủy Long (BOSS)", hp: 600000, gold: 80000, phan: 0.3, drop: { gem: 3, rate: 0.4 } },
        { name: "Hắc Quái", hp: 1000000, gold: 100000, phan: 0.5 },
        { name: "Hắc Binh", hp: 2000000, gold: 150000, phan: 0.5 },
        { name: "Hắc Sĩ (LIMIT BOSS)", hp: 5000000, gold: 400000, phan: 0.3, drop: { gem: 10, rate: 1.0 }, special: "time" }
    ];

    const SHOP_ITEMS = [
        // CHIẾN BINH
        { id: 1, name: "⚔️ Kiếm Gỉ", price: 250, type: "tay", dmg: 50, job: "Chiến Binh", cate: "War" },
        { id: 2, name: "🛡️ Giáp Vải Chiến", price: 250, type: "ao", hpBonus: 150, job: "Chiến Binh", cate: "War" },
        { id: 3, name: "⚔️ Kiếm Hiệp Sĩ", price: 2500, type: "tay", dmg: 220, job: "Chiến Binh", cate: "War" },
        { id: 4, name: "🛡️ Giáp Thép", price: 2500, type: "ao", hpBonus: 800, job: "Chiến Binh", cate: "War" },
        { id: 5, name: "🔥 Găng Tay King", price: 50000, type: "tay", dmg: 700, dmgLvl: 6, job: "Chiến Binh", cate: "War" },

        // PHÁP SƯ
        { id: 6, name: "🔮 Trượng Gỗ", price: 250, type: "tay", dmg: 60, job: "Pháp Sư", cate: "Mag" },
        { id: 7, name: "🧥 Áo Choàng Tập Sự", price: 250, type: "ao", hpBonus: 120, job: "Pháp Sư", cate: "Mag" },
        { id: 8, name: "🔮 Trượng Đồ Đệ", price: 2500, type: "tay", dmg: 260, job: "Pháp Sư", cate: "Mag" },
        { id: 9, name: "🧥 Áo Choàng Lụa", price: 2500, type: "ao", hpBonus: 650, job: "Pháp Sư", cate: "Mag" },
        { id: 10, name: "⚡ Trượng Ma Pháp Sư", price: 50000, type: "tay", dmg: 800, dmgLvl: 6, job: "Pháp Sư", cate: "Mag" },

        // PHỤ KIỆN
        { id: 100, name: "🧪 Bình Máu", price: 200, type: "pot", cate: "Acc" },
        { id: 11, name: "👟 Giày Tận Thế", price: 70000, type: "giay", hpBonus: 750, cate: "Acc" },
        { id: 12, name: "👖 Quần Animo", price: 70000, type: "quan", hpBonus: 750, cate: "Acc" },
        { id: 13, name: "💍 Nhẫn Blackhole", price: 200000, type: "nhan", hpBonus: 1800, dmgRate: 0.12, cate: "Acc" },
        { id: 14, name: "👑 Vương Miện Thánh", price: "50%", minGold: 999000, type: "non", dmg: 4000, dmgLvl: 15, cate: "Acc" }
    ];

    let p = { user:"", pass:"", job:"", lvl:1, gold:0, gems:0, hp:200, baseMaxHp:200, baseDmg:35, pots:0, inv:[], equip:{ao:null, tay:null, non:null, giay:null, quan:null, nhan:null} };
    let mob = { ...MOBS_DATA[0], maxHp: MOBS_DATA[0].hp };

    function auth(type) {
        let u = document.getElementById('user').value.trim();
        let ps = document.getElementById('pass').value.trim();
        if(!u || !ps) return alert("Nhập đủ tên và mật khẩu!");
        let saved = localStorage.getItem(STORAGE_KEY + u);
        if(type === 'reg') {
            if(saved) return alert("Tên đã có chủ!");
            p.user = u; p.pass = ps; 
            save(); alert("Đăng ký xong! Hãy chọn nghề."); showScreen('job-screen');
        } else {
            if(!saved) return alert("Sai tên hoặc mật khẩu!");
            let data = JSON.parse(saved);
            if(data.pass !== ps) return alert("Sai mật khẩu!");
            p = data;
            p.job ? showScreen('game-screen') : showScreen('job-screen');
        }
        initMobSelect(); updateUI();
    }

    function initMobSelect() {
        document.getElementById('mob-select').innerHTML = MOBS_DATA.map((m, i) => `<option value="${i}">${m.name} (${m.hp} HP)</option>`).join('');
    }

    function changeMob() {
        let idx = document.getElementById('mob-select').value;
        let selected = MOBS_DATA[idx];
        if(selected.special === "time") {
            let now = new Date();
            if(!(now.getHours() % 2 === 0 && now.getMinutes() <= 10)) {
                alert("Hắc Sĩ chỉ ra 10 phút đầu giờ chẵn!");
                document.getElementById('mob-select').value = 0;
                return;
            }
        }
        mob = { ...selected, maxHp: selected.hp };
        updateUI();
    }

    function calculateStats() {
        let bDmg = 0, bHp = 0, rDmg = 0;
        Object.values(p.equip).forEach(e => { if(e) { bDmg += (e.dmg || 0) + ((e.dmgLvl || 0) * p.lvl); bHp += (e.hpBonus || 0); rDmg += (e.dmgRate || 0); } });
        return { totalDmg: Math.floor((p.baseDmg + bDmg) * (1 + rDmg)), totalMaxHp: p.baseMaxHp + bHp };
    }

    function attack() {
        let s = calculateStats();
        let phan = Math.floor(s.totalDmg * (mob.phan || 0.1));
        mob.hp -= s.totalDmg; p.hp -= phan;
        log(`⚔️ Bạn -${s.totalDmg}. Bị phản -${phan}.`);
        if(mob.hp <= 0) {
            p.gold += mob.gold; p.lvl++;
            if(mob.drop && Math.random() <= mob.drop.rate) p.gems += mob.drop.gem;
            log(`✨ Diệt ${mob.name}! +${mob.gold}$`);
            mob.hp = mob.maxHp;
        }
        if(p.hp <= 0) { alert("Bạn đã gục ngã!"); p.hp = s.totalMaxHp; mob.hp = mob.maxHp; }
        save(); updateUI();
    }

    function renderShop(cate) {
        document.querySelectorAll('.shop-tab span').forEach(s => s.classList.remove('active-tab'));
        document.getElementById('tab-' + cate).classList.add('active-tab');
        let filtered = SHOP_ITEMS.filter(i => i.cate === cate);
        document.getElementById('shop-list').innerHTML = filtered.map(itm => {
            let canBuy = !itm.job || itm.job === p.job;
            return `<div class="item-card" style="opacity: ${canBuy?1:0.6}">
                <b>${itm.name}</b><br>Giá: ${itm.price === "50%" ? "50% Vàng" : itm.price + "$"}<br>
                <small>Yêu cầu: ${itm.job || 'Tất cả'}</small>
                <button onclick="buy(${itm.id})" style="float:right; background:${canBuy?'':'#444'}">${canBuy?'MUA':'SAI NGHỀ'}</button>
            </div>`;
        }).join('');
    }

    function buy(id) {
        let itm = SHOP_ITEMS.find(i => i.id === id);
        if(itm.job && itm.job !== p.job) return alert("Nghề của bạn không mua được món này!");
        let cost = itm.price === "50%" ? Math.floor(p.gold * 0.5) : itm.price;
        if(itm.price === "50%" && p.gold < itm.minGold) return alert("Cần tối thiểu 999k vàng!");
        if(p.gold >= cost) {
            p.gold -= cost;
            if(itm.type === 'pot') p.pots++; else p.inv.push({...itm, uid: Date.now()});
            save(); updateUI(); alert("Đã mua!");
        } else alert("Bạn không đủ vàng!");
    }

    function renderInv() {
        document.getElementById('inventory-list').innerHTML = p.inv.map(itm => {
            let isEq = Object.values(p.equip).some(e => e && e.uid === itm.uid);
            return `<div class="item-card">${itm.name} <button onclick="equip(${itm.uid})" style="float:right">${isEq ? 'THÁO' : 'MẶC'}</button></div>`;
        }).join('') || "Túi đồ trống";
    }

    function equip(uid) {
        let itm = p.inv.find(i => i.uid === uid);
        p.equip[itm.type] = (p.equip[itm.type]?.uid === uid) ? null : itm;
        save(); updateUI(); renderInv();
    }

    function setJob(j) { p.job = j; p.baseMaxHp = (j === 'Chiến Binh' ? 400 : 350); p.hp = p.baseMaxHp; save(); updateUI(); showScreen('game-screen'); }
    function updateUI() {
        let s = calculateStats();
        document.getElementById('gold').innerText = Math.floor(p.gold);
        document.getElementById('job-display').innerText = p.job || "Chưa chọn";
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('dmg-display').innerText = s.totalDmg;
        document.getElementById('hp-display').innerText = `${Math.floor(p.hp)}/${s.totalMaxHp}`;
        document.getElementById('hp-fill').style.width = (p.hp/s.totalMaxHp*100) + "%";
        document.getElementById('pot-count').innerText = p.pots;
        document.getElementById('mob-name').innerText = mob.name;
        document.getElementById('mob-hp').innerText = Math.floor(mob.hp);
    }
    function useHeal() { let s = calculateStats(); if(p.pots > 0) { p.pots--; p.hp = Math.min(s.totalMaxHp, p.hp + s.totalMaxHp*0.5); save(); updateUI(); } }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='shop-screen') renderShop(p.job === 'Chiến Binh' ? 'War' : 'Mag'); if(id==='bag-screen') renderInv(); }
    function log(m) { let l = document.getElementById('game-log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }
    function save() { localStorage.setItem(STORAGE_KEY + p.user, JSON.stringify(p)); }
</script>
</body>
</html>
