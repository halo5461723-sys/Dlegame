<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somalia World V6: Special Bonus</title>
    <style>
        body { background: #0b001a; color: #e0b0ff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; background-image: url('https://w0.peakpx.com/wallpaper/439/613/HD-wallpaper-purple-asteroid-purple-aesthetic-galaxy.jpg'); background-size: cover; background-attachment: fixed; }
        .container { background: rgba(0, 0, 0, 0.9); border: 2px solid #a200ff; border-radius: 15px; padding: 15px; max-width: 500px; margin: auto; box-shadow: 0 0 20px #a200ff; }
        .screen { display: none; }
        .active { display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; text-align: left; font-size: 14px; color: #ffd700; margin-bottom: 10px; padding: 10px; border-bottom: 1px dashed #a200ff; }
        button { background: #4b0082; color: white; border: 1px solid #a200ff; padding: 12px; margin: 5px; cursor: pointer; width: 90%; border-radius: 8px; font-weight: bold; }
        .item-card { border: 1px solid #555; padding: 10px; margin: 8px; font-size: 13px; background: rgba(255,255,255,0.05); border-radius: 5px; text-align: left; }
        .hp-bar { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #fff; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #ff9494); width: 100%; transition: 0.3s; }
        .log { font-size: 12px; height: 80px; overflow-y: auto; color: #ccc; background: rgba(0,0,0,0.5); padding: 8px; margin-top: 10px; border-radius: 5px; text-align: left; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: 1px solid #a200ff; background: #1a1a1a; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="screen active">
        <h1>SOMALIA RPG V6</h1>
        <input type="text" id="user" placeholder="Tên tài khoản"><br>
        <input type="password" id="pass" placeholder="Mật khẩu"><br>
        <button onclick="auth('login')">ĐĂNG NHẬP</button>
        <button onclick="auth('reg')">ĐĂNG KÝ MỚI</button>
    </div>

    <div id="job-screen" class="screen">
        <h2>CHỌN NGHỀ NGHIỆP</h2>
        <button onclick="setJob('Cận Chiến')">CẬN CHIẾN</button>
        <button onclick="setJob('Phép Thuật')">PHÉP THUẬT</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-grid">
            <div>💰 Vàng: <span id="gold">0</span>$</div>
            <div>⭐ Cấp: <span id="lvl">1</span></div>
            <div>⚔️ Dame: <span id="dmg-display">10</span></div>
            <div>❤️ Máu: <span id="hp-display">100/100</span></div>
        </div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <h2 id="mob-name" style="color: #ff4d4d;">Quái Slime</h2>
        <p>HP Quái: <span id="mob-hp">50</span></p>
        <button onclick="attack()">⚔️ TẤN CÔNG</button>
        <div style="display: flex; justify-content: space-around;">
            <button onclick="showScreen('shop-screen')" style="width: 45%;">🛒 SHOP</button>
            <button onclick="showScreen('bag-screen')" style="width: 45%;">🎒 BALO</button>
        </div>
        <div id="game-log" class="log"></div>
    </div>

    <div id="shop-screen" class="screen">
        <h2>CỬA HÀNG</h2>
        <p>Vàng: <span id="shop-gold">0</span>$</p>
        <div id="shop-list"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>

    <div id="bag-screen" class="screen">
        <h2>BALO ĐỒ</h2>
        <div id="inventory-list"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>
</div>

<script>
    const MOBS_DATA = [
        { name: "Slime", hp: 100, gold: 10 },
        { name: "King Slime", hp: 200, gold: 50 },
        { name: "Người Xương", hp: 500, gold: 1000 },
        { name: "Vua Xương", hp: 2000, gold: 3000 },
        { name: "Vua Xương Cổ Đại (BOSS)", hp: 10000, gold: 7000, special: "10percent" }
    ];

    const SHOP_ITEMS = [
        { id: 1, name: "Áo choàng bình thường", price: 100, type: "ao", hpBonus: 25 },
        { id: 2, name: "Găng tay da", price: 250, type: "tay", dmg: 20, dmgLvl: 2, job: "Cận Chiến" },
        { id: 3, name: "Trượng ma pháp cũ", price: 250, type: "tay", dmg: 25, dmgLvl: 2.5, job: "Phép Thuật" },
        { id: 4, name: "Áo choàng hoàng tử", price: 20000, type: "ao", hpBonus: 120, hpLvl: 2 },
        { id: 5, name: "Găng tay kỵ sĩ", price: 2500, type: "tay", dmg: 200, dmgLvl: 4, job: "Cận Chiến" },
        { id: 6, name: "Trượng ma thuật sư", price: 2500, type: "tay", dmg: 300, dmgLvl: 4, job: "Phép Thuật" }
    ];

    let p = { user:"", pass:"", job:"", lvl:1, gold:0, hp:100, baseMaxHp:100, baseDmg:10, inv:[], equip:{ao:null, tay:null} };
    let curMobIdx = 0;
    let mob = { ...MOBS_DATA[0], maxHp: MOBS_DATA[0].hp };

    function auth(type) {
        let u = document.getElementById('user').value;
        let ps = document.getElementById('pass').value;
        let saved = localStorage.getItem('somalia_v6_' + u);
        if(type === 'reg') {
            if(saved) return alert("Tên tồn tại!");
            p.user = u; p.pass = ps; save(); showScreen('job-screen');
        } else {
            if(!saved || JSON.parse(saved).pass !== ps) return alert("Sai tài khoản!");
            p = {...p, ...JSON.parse(saved)};
            p.job ? showScreen('game-screen') : showScreen('job-screen');
        }
        updateUI();
    }

    function setJob(job) {
        p.job = job;
        if(job === 'Cận Chiến') { p.baseMaxHp = 150; p.hp = 150; p.baseDmg = 15; }
        else { p.baseMaxHp = 100; p.hp = 100; p.baseDmg = 25; }
        save(); updateUI(); showScreen('game-screen');
    }

    function calculateStats() {
        let maxHp = p.baseMaxHp;
        let dmg = p.baseDmg;

        if(p.equip.ao) {
            maxHp += p.equip.ao.hpBonus || 0;
            if(p.equip.ao.hpLvl) maxHp += p.equip.ao.hpLvl * p.lvl;
        }
        if(p.equip.tay) {
            dmg += p.equip.tay.dmg || 0;
            if(p.equip.tay.dmgLvl) dmg += p.equip.tay.dmgLvl * p.lvl;
        }
        return { maxHp, dmg };
    }

    function attack() {
        let stats = calculateStats();
        let dmgToMob = (mob.special === "10percent") ? mob.maxHp * 0.1 : stats.dmg;
        let phan = Math.floor(dmgToMob * 0.1);

        mob.hp -= dmgToMob;
        p.hp -= phan;
        log(`Đánh: -${dmgToMob} | Phản: -${phan}`);

        if(mob.hp <= 0) {
            p.gold += mob.gold; p.lvl++;
            log(`DIỆT ${mob.name}! +${mob.gold}$ | UP LV ${p.lvl}`);
            curMobIdx = (curMobIdx + 1) % MOBS_DATA.length;
            mob = { ...MOBS_DATA[curMobIdx], maxHp: MOBS_DATA[curMobIdx].hp };
            p.hp = calculateStats().maxHp; // Hồi máu
        }

        if(p.hp <= 0) {
            alert("Tử trận!"); p.gold = Math.floor(p.gold * 0.9);
            p.hp = stats.maxHp; mob.hp = mob.maxHp;
        }
        save(); updateUI();
    }

    function renderShop() {
        let html = "";
        SHOP_ITEMS.forEach(itm => {
            let owned = p.inv.find(i => i.id === itm.id);
            let jobOk = !itm.job || itm.job === p.job;
            html += `<div class="item-card">
                <b>${itm.name}</b><br>
                ${itm.hpBonus ? `+${itm.hpBonus} HP ` : ""}${itm.hpLvl ? `(+${itm.hpLvl}/Lv)` : ""}
                ${itm.dmg ? `+${itm.dmg} Dame ` : ""}${itm.dmgLvl ? `(+${itm.dmgLvl}/Lv)` : ""}<br>
                Giá: ${itm.price}$ <button onclick="buy(${itm.id})" ${owned || !jobOk ? "disabled" : ""}>Mua</button>
            </div>`;
        });
        document.getElementById('shop-list').innerHTML = html;
    }

    function buy(id) {
        let itm = SHOP_ITEMS.find(i => i.id === id);
        if(p.gold >= itm.price) { p.gold -= itm.price; p.inv.push(itm); save(); updateUI(); renderShop(); }
    }

    function renderInv() {
        let html = "";
        p.inv.forEach(itm => {
            let isEq = (p.equip.ao?.id === itm.id || p.equip.tay?.id === itm.id);
            html += `<div class="item-card">${itm.name} <button onclick="equip(${itm.id})">${isEq ? "Tháo" : "Mặc"}</button></div>`;
        });
        document.getElementById('inventory-list').innerHTML = html || "Trống";
    }

    function equip(id) {
        let itm = p.inv.find(i => i.id === id);
        if(p.equip[itm.type]?.id === itm.id) p.equip[itm.type] = null;
        else p.equip[itm.type] = itm;
        save(); updateUI(); renderInv();
    }

    function updateUI() {
        let stats = calculateStats();
        document.getElementById('gold').innerText = p.gold;
        document.getElementById('shop-gold').innerText = p.gold;
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('dmg-display').innerText = Math.floor(stats.dmg);
        document.getElementById('hp-display').innerText = `${Math.floor(p.hp)}/${Math.floor(stats.maxHp)}`;
        document.getElementById('hp-fill').style.width = (p.hp / stats.maxHp * 100) + "%";
        document.getElementById('mob-name').innerText = mob.name;
        document.getElementById('mob-hp').innerText = Math.floor(mob.hp);
    }

    function log(m) { let l = document.getElementById('game-log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }
    function save() { localStorage.setItem('somalia_v6_' + p.user, JSON.stringify(p)); }
    function showScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'shop-screen') renderShop();
        if(id === 'bag-screen') renderInv();
    }
</script>
</body>
</html>
