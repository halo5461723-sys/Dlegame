<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somalia World: Origins</title>
    <style>
        body { background: #0b001a; color: #e0b0ff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; text-align: center; background-image: url('https://w0.peakpx.com/wallpaper/439/613/HD-wallpaper-purple-asteroid-purple-aesthetic-galaxy.jpg'); background-size: cover; background-attachment: fixed; }
        .container { background: rgba(0, 0, 0, 0.85); border: 2px solid #a200ff; border-radius: 15px; padding: 15px; max-width: 500px; margin: auto; position: relative; }
        .stats-bar { position: absolute; top: 10px; left: 10px; text-align: left; font-size: 12px; color: #ffd700; }
        .screen { display: none; }
        .active { display: block; }
        button { background: #4b0082; color: white; border: 1px solid #a200ff; padding: 10px; margin: 5px; cursor: pointer; width: 80%; border-radius: 5px; }
        button:hover { background: #a200ff; }
        .hp-bar { width: 100%; height: 15px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #fff; }
        #hp-fill { height: 100%; background: #ff4d4d; width: 100%; transition: 0.3s; }
        .log { font-size: 12px; height: 60px; overflow-y: auto; color: #ccc; background: rgba(255,255,255,0.1); padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="screen active">
        <h1>SOMALIA RPG</h1>
        <input type="text" id="user" placeholder="Tên tài khoản"><br><br>
        <input type="password" id="pass" placeholder="Mật khẩu"><br>
        <button onclick="auth('login')">ĐĂNG NHẬP</button>
        <button onclick="auth('reg')">ĐĂNG KÝ MỚI</button>
    </div>

    <div id="job-screen" class="screen">
        <h2>CHỌN NGHỀ NGHIỆP</h2>
        <button onclick="setJob('Cận Chiến')">CẬN CHIẾN (Máu trâu)</button>
        <button onclick="setJob('Phép Thuật')">PHÉP THUẬT (Dame to)</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-bar">
            💰 Vàng: <span id="gold">0</span><br>
            ⭐ Cấp: <span id="lvl">1</span> (<span id="exp">0</span>/50)
        </div>
        
        <h3 id="player-info">Sát thủ</h3>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <p>Máu: <span id="hp-text">100/100</span> | Dame: <span id="dmg-text">10</span></p>

        <hr>
        <h2 id="mob-name">Quái Slime</h2>
        <p>Máu quái: <span id="mob-hp">50</span></p>
        <button onclick="attack()">ĐÁNH QUÁI (Phản dame 50%)</button>
        <button onclick="showShop()">VÀO CỬA HÀNG</button>

        <div id="game-log" class="log">Chào mừng bạn đến với Somalia!</div>
    </div>

    <div id="shop-screen" class="screen">
        <h2>CỬA HÀNG</h2>
        <p>Vàng của bạn: <span id="shop-gold">0</span></p>
        <button onclick="buy('boost')">Mua Boost (+5 Dame) - 50 Vàng</button>
        <button onclick="buy('armor')">Mua Giáp (+50 Máu) - 80 Vàng</button>
        <button onclick="backToGame()">QUAY LẠI</button>
    </div>
</div>

<script>
    let p = { user:"", pass:"", job:"", lvl:1, exp:0, hp:100, maxHp:100, dmg:10, gold:0, items:0 };
    let mob = { name: "Slime", hp: 50, maxHp: 50, exp: 10, gold: 10 };

    function auth(type) {
        let u = document.getElementById('user').value;
        let ps = document.getElementById('pass').value;
        if(!u || !ps) return alert("Nhập đủ thông tin!");

        let saved = localStorage.getItem('user_' + u);
        if(type === 'reg') {
            if(saved) return alert("Tên đã tồn tại!");
            p.user = u; p.pass = ps;
            showScreen('job-screen');
        } else {
            if(!saved || JSON.parse(saved).pass !== ps) return alert("Sai tk hoặc mk!");
            p = JSON.parse(saved);
            updateUI();
            showScreen('game-screen');
        }
    }

    function setJob(job) {
        p.job = job;
        if(job === 'Cận Chiến') { p.hp = 150; p.maxHp = 150; p.dmg = 12; }
        else { p.hp = 80; p.maxHp = 80; p.dmg = 25; }
        save();
        updateUI();
        showScreen('game-screen');
    }

    function attack() {
        // Đánh quái
        mob.hp -= p.dmg;
        // Phản dame 50% sát thương của mình
        let phản = Math.floor(p.dmg * 0.5);
        p.hp -= phản;

        log(`Bạn chém ${p.dmg} dame. Quái phản ${phản} dame!`);

        if(mob.hp <= 0) {
            log(`Diệt ${mob.name}! +${mob.gold} vàng, +${mob.exp} exp`);
            p.gold += mob.gold;
            p.exp += mob.exp;
            mob.hp = mob.maxHp + (p.lvl * 10); // Quái mạnh dần
            checkLvl();
        }

        if(p.hp <= 0) {
            alert("Bạn đã tử trận! Hồi sinh mất 20% vàng.");
            p.hp = p.maxHp;
            p.gold = Math.floor(p.gold * 0.8);
            mob.hp = mob.maxHp;
        }
        save();
        updateUI();
    }

    function checkLvl() {
        let need = p.lvl * 50;
        if(p.exp >= need) {
            p.lvl++;
            p.exp = 0;
            p.maxHp += 20;
            p.hp = p.maxHp;
            p.dmg += 5;
            alert("LÊN CẤP! Bạn hiện tại cấp " + p.lvl);
        }
    }

    function buy(item) {
        if(item === 'boost' && p.gold >= 50) {
            p.gold -= 50; p.dmg += 5; alert("Đã mua Boost!");
        } else if(item === 'armor' && p.gold >= 80) {
            p.gold -= 80; p.maxHp += 50; p.hp += 50; alert("Đã mua Giáp!");
        } else {
            alert("Không đủ tiền!");
        }
        save();
        updateUI();
        showShop();
    }

    function updateUI() {
        document.getElementById('player-info').innerText = p.user + " (" + p.job + ")";
        document.getElementById('gold').innerText = p.gold;
        document.getElementById('shop-gold').innerText = p.gold;
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('exp').innerText = p.exp;
        document.getElementById('hp-text').innerText = p.hp + "/" + p.maxHp;
        document.getElementById('dmg-text').innerText = p.dmg;
        document.getElementById('mob-hp').innerText = mob.hp;
        let pt = (p.hp / p.maxHp) * 100;
        document.getElementById('hp-fill').style.width = pt + "%";
    }

    function log(msg) {
        let l = document.getElementById('game-log');
        l.innerHTML = msg + "<br>" + l.innerHTML;
    }

    function save() { localStorage.setItem('user_' + p.user, JSON.stringify(p)); }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function showShop() { showScreen('shop-screen'); }
    function backToGame() { showScreen('game-screen'); }
</script>

</body>
</html>
