<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somalia World V10 - Final Championship</title>
    <style>
        :root { --p-color: #a200ff; --gold: #ffd700; --bg-dark: rgba(0, 0, 0, 0.95); }
        body { background: #0b001a; color: #e0b0ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; background-image: url('https://w0.peakpx.com/wallpaper/439/613/HD-wallpaper-purple-asteroid-purple-aesthetic-galaxy.jpg'); background-size: cover; background-attachment: fixed; overflow-x: hidden; }
        .container { background: var(--bg-dark); border: 2px solid var(--p-color); border-radius: 15px; padding: 15px; max-width: 450px; margin: auto; box-shadow: 0 0 25px var(--p-color); position: relative; }
        .screen { display: none; }
        .active { display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; text-align: left; font-size: 14px; color: var(--gold); margin-bottom: 10px; padding: 10px; border-bottom: 1px dashed var(--p-color); }
        button { background: #4b0082; color: white; border: 1px solid var(--p-color); padding: 12px; margin: 5px; cursor: pointer; width: 92%; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); background: var(--p-color); }
        button:disabled { background: #222; border-color: #444; color: #666; }
        .item-card { border: 1px solid #555; padding: 12px; margin: 8px; font-size: 13px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: left; }
        .hp-bar { width: 100%; height: 24px; background: #333; border-radius: 12px; overflow: hidden; margin: 10px 0; border: 1.5px solid #fff; position: relative; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #ff9494); width: 100%; transition: 0.3s; }
        .hp-text-overlay { position: absolute; width: 100%; text-align: center; font-size: 12px; font-weight: bold; color: white; line-height: 24px; text-shadow: 1px 1px 2px black; }
        .log { font-size: 12px; height: 120px; overflow-y: auto; color: #ccc; background: rgba(0,0,0,0.7); padding: 10px; margin-top: 10px; border-radius: 5px; text-align: left; border: 1px solid #444; line-height: 1.5; }
        select { padding: 12px; width: 95%; background: #1a1a1a; color: var(--gold); border: 1px solid var(--p-color); border-radius: 8px; margin-bottom: 10px; font-weight: bold; outline: none; }
        input { padding: 12px; width: 85%; margin-bottom: 10px; border-radius: 5px; border: 1px solid var(--p-color); background: #1a1a1a; color: white; outline: none; }
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 25% { transform: translate(-2px, -2px); } 50% { transform: translate(2px, -2px); } 75% { transform: translate(-2px, 2px); } 100% { transform: translate(0, 0); } }
    </style>
</head>
<body>

<div class="container" id="main-cont">
    <div id="auth-screen" class="screen active">
        <h1 style="letter-spacing: 2px;">SOMALIA WORLD</h1>
        <p style="font-size: 12px; color: #aaa; margin-top: -15px;">Dự Án Đi Thi - Final Version</p>
        <input type="text" id="user" placeholder="Tên anh hùng..."><br>
        <input type="password" id="pass" placeholder="Mật khẩu..."><br>
        <button onclick="auth('login')">VÀO TRẬN</button>
        <button onclick="auth('reg')" style="background:none; border:none; color:#aaa; font-size:12px;">Chưa có tài khoản? Đăng ký</button>
    </div>

    <div id="job-screen" class="screen">
        <h2>CHỌN HỆ PHÁI</h2>
        <button onclick="setJob('Cận Chiến')">⚔️ CẬN CHIẾN (HP: 70 | Dame: 10)</button>
        <button onclick="setJob('Phép Thuật')">🔮 PHÉP THUẬT (HP: 50 | Dame: 20)</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-grid">
            <div>💰 Vàng: <span id="gold">0</span></div>
            <div>⭐ Cấp: <span id="lvl">1</span></div>
            <div>⚔️ Dame: <span id="dmg-display">0</span></div>
            <div>🧪 Potion: <span id="pot-count">0</span></div>
        </div>
        <div class="hp-bar">
            <div id="hp-fill"></div>
            <div class="hp-text-overlay" id="hp-display">50/50</div>
        </div>
        
        <p style="font-size: 12px; margin: 5px 0 0 0; color: #aaa;">Chọn mục tiêu săn quái:</p>
        <select id="mob-select" onchange="changeMob()"></select>

        <h2 id="mob-name" style="color: #ff4d4d; margin: 10px 0 5px 0; text-shadow: 0 0 5px #000;">-</h2>
        <div style="font-size: 14px; margin-bottom: 10px;">HP Quái: <span id="mob-hp" style="font-weight:bold; color:#fff;">0</span></div>
        
        <button onclick="attack()" style="background: #800000; height: 60px; font-size: 20px; box-shadow: 0 4px 0 #500000;">⚔️ TẤN CÔNG ⚔️</button>
        
        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
            <button onclick="useHeal()" style="background:#28a745; width:48%; border-color:#fff;">🧪 HỒI MÁU</button>
            <button onclick="showScreen('bag-screen')" style="width:48%;">🎒 BALO</button>
        </div>
        <button onclick="showScreen('shop-screen')">🛒 CỬA HÀNG TRANG BỊ</button>

        <div id="game-log" class="log"></div>
    </div>

    <div id="shop-screen" class="screen">
        <h2>CỬA HÀNG</h2>
        <p>Vàng bạn có: <span id="shop-gold" style="color:gold;">0</span>$</p>
        <div id="shop-list"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>

    <div id="bag-screen" class="screen">
        <h2>KHO ĐỒ CỦA BẠN</h2>
        <div id="inventory-list"></div>
        <button onclick="showScreen('game-screen')">QUAY LẠI</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SOMALIA_PERMANENT_V1_';
    const MOBS_DATA = [
        { name: "Quái Slime", hp: 100, gold: 15, phan: 0.1 },
        { name: "Vua Slime", hp: 300, gold: 100, phan: 0.1 },
        { name: "Lính Xương", hp: 800, gold: 1500, phan: 0.1 },
        { name: "Vua Xương", hp: 2000, gold: 3500, phan: 0.1 },
        { name: "Vua Xương Cổ Đại (BOSS)", hp: 5000, gold: 10000, phan: 0.1 }
    ];

    const SHOP_ITEMS = [
        { id: 100, name: "🧪 Bình Máu (Hồi 50% HP)", price: 50, type: "pot" },
        { id: 1, name: "Áo Da Sờn", price: 100, type: "ao", hpBonus: 15 },
        { id: 2, name: "Găng Tay Da", price: 250, type: "tay", dmg: 10, dmgLvl: 1, job: "Cận Chiến" },
        { id: 3, name: "Trượng Gỗ Cũ", price: 250, type: "tay", dmg: 15, dmgLvl: 1.5, job: "Phép Thuật" },
        { id: 4, name: "Giáp Hoàng Tử", price: 2000, type: "ao", hpBonus: 60, hpLvl: 2 },
        { id: 5, name: "Găng Kỵ Sĩ", price: 3000, type: "tay", dmg: 70, dmgLvl: 4, job: "Cận Chiến" },
        { id: 6, name: "Trượng Thần", price: 3000, type: "tay", dmg: 100, dmgLvl: 5, job: "Phép Thuật" }
    ];

    let p = { user:"", pass:"", job:"", lvl:1, gold:0, hp:50, baseMaxHp:50, baseDmg:10, pots:0, inv:[], equip:{ao:null, tay:null} };
    let mob = { ...MOBS_DATA[0], maxHp: MOBS_DATA[0].hp };

    function auth(type) {
        let u = document.getElementById('user').value.trim();
        let ps = document.getElementById('pass').value.trim();
        if(!u || !ps) return alert("Vui lòng điền đủ thông tin!");
        let saved = localStorage.getItem(STORAGE_KEY + u);
        if(type === 'reg') {
            if(saved) return alert("Tên tài khoản đã tồn tại!");
            p.user = u; p.pass = ps; save(); alert("Đăng ký thành công!"); showScreen('job-screen');
        } else {
            if(!saved) return alert("Không tìm thấy tài khoản!");
            let data = JSON.parse(saved);
            if(data.pass !== ps) return alert("Sai mật khẩu!");
            p = { ...p, ...data }; p.job ? showScreen('game-screen') : showScreen('job-screen');
        }
        initMobSelect(); updateUI();
    }

    function initMobSelect() {
        document.getElementById('mob-select').innerHTML = MOBS_DATA.map((m, i) => `<option value="${i}">${m.name} (HP: ${m.hp})</option>`).join('');
    }

    function changeMob() {
        const idx = document.getElementById('mob-select').value;
        mob = { ...MOBS_DATA[idx], maxHp: MOBS_DATA[idx].hp };
        log(`Mục tiêu hiện tại: ${mob.name}`); updateUI();
    }

    function setJob(job) {
        p.job = job; p.baseMaxHp = (job === 'Cận Chiến') ? 70 : 50;
        p.hp = p.baseMaxHp; p.baseDmg = (job === 'Cận Chiến') ? 10 : 20;
        save(); updateUI(); showScreen('game-screen');
    }

    function calculateStats() {
        let maxHp = p.baseMaxHp + (p.equip.ao?.hpBonus || 0) + ((p.equip.ao?.hpLvl || 0) * p.lvl);
        let dmg = p.baseDmg + (p.equip.tay?.dmg || 0) + ((p.equip.tay?.dmgLvl || 0) * p.lvl);
        return { maxHp, dmg };
    }

    function attack() {
        let stats = calculateStats();
        let dmgToMob = stats.dmg; 
        let phan = Math.floor(dmgToMob * 0.1); // Cố định phản 10% như bạn chọn

        mob.hp -= dmgToMob; p.hp -= phan;
        document.getElementById('main-cont').classList.add('shake');
        setTimeout(() => document.getElementById('main-cont').classList.remove('shake'), 200);

        log(`⚔️ Bạn gây: -${dmgToMob} HP. Phản đòn: -${phan} HP.`);

        if(mob.hp <= 0) {
            let bonus = Math.floor(Math.random() * 30);
            p.gold += mob.gold + bonus; p.lvl++;
            log(`✨ CHIẾN THẮNG! Nhận ${mob.gold + bonus}$ và lên cấp ${p.lvl}!`);
            mob.hp = mob.maxHp; p.hp = calculateStats().maxHp;
        }
        if(p.hp <= 0) {
            alert("Bạn đã hy sinh! Bị trừ 10% vàng.");
            p.gold = Math.floor(p.gold * 0.9); p.hp = stats.maxHp; mob.hp = mob.maxHp;
        }
        save(); updateUI();
    }

    function useHeal() {
        let stats = calculateStats();
        if(p.pots > 0 && p.hp < stats.maxHp) {
            p.pots--; p.hp = Math.min(stats.maxHp, p.hp + (stats.maxHp * 0.5));
            log("🧪 Đã uống Bình Máu! Hồi 50% HP."); save(); updateUI();
        } else if(p.pots === 0) log("❌ Bạn không có Bình Máu!");
    }

    function renderShop() {
        let html = SHOP_ITEMS.map(itm => {
            let owned = p.inv.find(i => i.id === itm.id);
            let jobMatch = !itm.job || itm.job === p.job;
            let canBuy = itm.type === 'pot' || (!owned && jobMatch);
            return `<div class="item-card"><b>${itm.name}</b><br>Giá: <span style="color:gold">${itm.price}$</span> <button onclick="buy(${itm.id})" ${!canBuy ? "disabled" : ""} style="width:auto; float:right; padding:5px 15px;">${owned ? "Đã có" : "Mua"}</button></div>`;
        }).join('');
        document.getElementById('shop-list').innerHTML = html;
    }

    function buy(id) {
        let itm = SHOP_ITEMS.find(i => i.id === id);
        if(p.gold >= itm.price) {
            p.gold -= itm.price;
            if(itm.type === 'pot') p.pots++; else p.inv.push(itm);
            save(); updateUI(); renderShop();
            log(`Đã mua ${itm.name}!`);
        } else alert("Bạn không đủ vàng!");
    }

    function renderInv() {
        let html = p.inv.map(itm => {
            let isEq = (p.equip.ao?.id === itm.id || p.equip.tay?.id === itm.id);
            return `<div class="item-card">${itm.name} <button onclick="equip(${itm.id})" style="width:auto; float:right; padding:5px 15px;">${isEq ? "THÁO" : "MẶC"}</button></div>`;
        }).join('');
        document.getElementById('inventory-list').innerHTML = html || "Balo trống rỗng...";
    }

    function equip(id) {
        let itm = p.inv.find(i => i.id === id);
        if(p.equip[itm.type]?.id === itm.id) p.equip[itm.type] = null;
        else p.equip[itm.type] = itm;
        save(); updateUI(); renderInv();
    }

    function updateUI() {
        let stats = calculateStats();
        document.getElementById('gold').innerText = p.gold;
        document.getElementById('shop-gold').innerText = p.gold;
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('pot-count').innerText = p.pots;
        document.getElementById('dmg-display').innerText = Math.floor(stats.dmg);
        document.getElementById('hp-display').innerText = `${Math.max(0, Math.floor(p.hp))}/${Math.floor(stats.maxHp)}`;
        document.getElementById('hp-fill').style.width = (Math.max(0, p.hp) / stats.maxHp * 100) + "%";
        document.getElementById('mob-name').innerText = mob.name;
        document.getElementById('mob-hp').innerText = Math.max(0, Math.floor(mob.hp));
    }

    function log(m) { 
        let l = document.getElementById('game-log'); 
        l.innerHTML = `> ${m}<br>${l.innerHTML}`; 
    }

    function save() { localStorage.setItem(STORAGE_KEY + p.user, JSON.stringify(p)); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'shop-screen') renderShop();
        if(id === 'bag-screen') renderInv();
    }
</script>
</body>
</html>
